    <!--    
        xs = extra small = màn hình điện thoại nhỏ
        sm = small = màn hình máy tính bảng hoặc điện thoại lớn
        md = medium = màn hình desktop nhỏ hoặc tablet lớn
        lg = large = màn hình máy tính độ phân giải cao
        xl = extra large = màn hình máy tính độ phân giải cao nhất
        
        
        col-xs-6 có nghĩa là nếu chạy trên màn hình điện thoại (xs) thì cột này có độ rộng là 6/12 (nữa màn hình ==> 2 cột /
        dòng)
        col-sm-4 có nghĩa là nếu chạy trên màn hình máy tính bảng (sm) thì cột này có độ rộng là 4/12 (1/3 màn hình ==> có 3
        cột/dòng)
        col-md-2 có nghĩa là nếu chạy trên màn hình máy tính nhỏ (md) thì cột này có độ rộng là 2/12 (1/6 màn hình ==> có 6
        cột/dòng)
        col-lg-1 có nghĩa là nếu chạy trên màn hình máy tính phân giải cao (lg) thì cột này có độ rộng là 1/12 (1/12 màn hình
        ==> có 12 cột/dòng)
    -->
